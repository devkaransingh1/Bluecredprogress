<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API Page</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Inter, Arial, sans-serif;
            background: #f7f9fc;
            color: #111827;
        }

        body {
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: min(100%, 520px);
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 18px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.06);
            padding: 32px;
        }

        h1 {
            margin: 0 0 16px;
            font-size: 1.65rem;
            letter-spacing: -0.02em;
        }

        p {
            margin: 0 0 1rem;
            line-height: 1.7;
            color: #475569;
        }

        .data-block {
            background: #f1f5f9;
            border-radius: 14px;
            padding: 20px;
            white-space: pre-wrap;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            color: #0f172a;
            line-height: 1.8;
            border: 1px solid #cbd5e1;
        }

        .button-row {
            display: flex;
            gap: 12px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            border-radius: 999px;
            padding: 0.85rem 1.35rem;
            background: #2563eb;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover {
            background: #1d4ed8;
        }

        .status {
            font-size: 0.95rem;
            color: #475569;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>API Test Page</h1>
        <p>Click the button to fetch the sample data from <code>/api/test</code>.</p>
        <div id="data" class="data-block">No data loaded yet.</div>
        <div class="button-row">
            <button id="refreshBtn" type="button">Fetch Data</button>
        </div>
        <div id="status" class="status">Ready.</div>
    </div>

    <script>
        const dataContainer = document.getElementById('data');
        const statusText = document.getElementById('status');
        const refreshBtn = document.getElementById('refreshBtn');

        function renderData(data) {
            dataContainer.innerHTML = `industry_id: ${data.industry_id}\nCO2: ${data.co2}\n\nPM2.5: ${data.pm25}\n\nWater Quality: ${data.water_quality}`;
        }

        async function loadData() {
            statusText.textContent = 'Loading...';
            try {
                const response = await fetch('/api/test');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                renderData(data);
                statusText.textContent = 'Data loaded successfully.';
            } catch (error) {
                dataContainer.innerHTML = 'Unable to load data.';
                statusText.textContent = `Error: ${error.message}`;
            }
        }

        refreshBtn.addEventListener('click', loadData);
        loadData();
    </script>
</body>
</html>
